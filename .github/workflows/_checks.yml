name: Checks

on:
  workflow_call:
    inputs:
      os-matrix:
        description: JSON array of runner OSes to fan out across.
        required: true
        type: string

jobs:
  ci:
    name: check / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
        # Phase 10.2 (ADR-0025): fan across both Python versions on every OS to
        # stress the tracer's frame-capture technique, which is sensitive to
        # dispatch-shape differences across interpreter versions.
        python-version: ["3.12", "3.13"]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        run: corepack enable pnpm

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # The Go runtime adapter only builds the dependency-free tiny-go-app
          # fixture (no go.sum), so there is nothing to cache; disabling the
          # module cache avoids a misleading "go.sum not found" warning.
          cache: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Codegen
        run: pnpm codegen

      - name: Check parity
        run: pnpm check-parity

      - name: Biome
        run: pnpm exec biome ci .

      - name: TypeScript
        run: pnpm typecheck

      - name: Frontend tests
        run: pnpm --filter @grackle/frontend test --run

      - name: Install Python dependencies
        working-directory: packages/agent
        run: uv sync --frozen

      - name: Ruff
        working-directory: packages/agent
        run: uv run ruff check .

      - name: Mypy
        working-directory: packages/agent
        run: uv run mypy --strict src tests

      - name: Pytest
        working-directory: packages/agent
        run: uv run pytest -q
