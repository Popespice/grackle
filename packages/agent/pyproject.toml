[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "grackle"
version = "0.11.0"
description = "Local-first live code visualizer for Python"
license = { text = "MIT" }
authors = [{ name = "Connor Allen", email = "connor.allen9@icloud.com" }]
requires-python = ">=3.12"
dependencies = [
    "websockets>=16,<17",
    "click>=8.3.3",
    "structlog>=25.5.0",
    "jsonschema>=4.26.0",
    "tree-sitter>=0.25,<0.26",
    "tree-sitter-typescript>=0.23.2,<0.24",
    "tree-sitter-go>=0.23,<0.24",
    "tree-sitter-rust>=0.23,<0.24",
]

[project.optional-dependencies]
# --watch's event-driven backend (grackle/watcher.py). Never required: when
# absent, `grackle serve --watch` transparently falls back to a stdlib
# mtime-poller. `pip install grackle[watch]` / `uv sync --extra watch`.
watch = ["watchfiles>=0.24,<2"]

[project.scripts]
grackle = "grackle.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/grackle"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-jsonschema",
    # Present in dev so CI exercises + type-checks the optional watchfiles
    # backend; the *product* dependency stays opt-in via [watch] above.
    "watchfiles>=0.24,<2",
]

[tool.ruff]
line-length = 100
exclude = ["src/grackle/_generated"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "TCH", "PTH"]

[tool.mypy]
strict = true
exclude = ["src/grackle/_generated/"]

[[tool.mypy.overrides]]
# Defense-in-depth for anyone running mypy without the dev group synced
# (e.g. a trimmed environment) — the dev-group install above normally gives
# mypy real stubs, so this override is a no-op most of the time.
module = "watchfiles"
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
