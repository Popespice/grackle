[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "grackle"
version = "0.8.0"
description = "Local-first live code visualizer for Python"
license = { text = "MIT" }
authors = [{ name = "Connor Allen", email = "connor.allen9@icloud.com" }]
requires-python = ">=3.12"
dependencies = [
    "websockets>=16,<17",
    "click>=8.3.3",
    "structlog>=25.5.0",
    "jsonschema>=4.26.0",
    "tree-sitter>=0.25,<0.26",
    "tree-sitter-typescript>=0.23,<0.24",
    "tree-sitter-go>=0.23,<0.24",
    "tree-sitter-rust>=0.23,<0.24",
]

[project.scripts]
grackle = "grackle.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/grackle"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-jsonschema",
]

[tool.ruff]
line-length = 100
exclude = ["src/grackle/_generated"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "TCH", "PTH"]

[tool.mypy]
strict = true
exclude = ["src/grackle/_generated/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
