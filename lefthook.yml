pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files} && git add {staged_files}
    ruff-format:
      glob: "*.py"
      root: "packages/agent/"
      stage_fixed: true
      run: uv run ruff format {staged_files} && uv run ruff check --fix {staged_files}
    schema-parity:
      glob: "packages/shared-types/schema/*.json"
      run: pnpm --filter @grackle/shared-types codegen

pre-push:
  parallel: false
  commands:
    biome:
      run: pnpm exec biome ci .
    ruff:
      root: "packages/agent/"
      run: uv run ruff check .
    check-parity:
      run: pnpm check-parity
    typecheck:
      run: pnpm typecheck
    test-frontend:
      run: pnpm --filter @grackle/frontend test --run
    mypy:
      root: "packages/agent/"
      run: uv run mypy --strict src tests
    test-agent:
      root: "packages/agent/"
      run: uv run pytest -q

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
